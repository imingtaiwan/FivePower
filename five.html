<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FivePower</title>

<style>
body {
  font-family: sans-serif;
  background:#f5f7fa;
  margin:0;
  padding:20px;
}

h1 {
  margin-bottom:10px;
}

.container {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}

.card {
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.slider {
  width:100%;
}

.bar {
  height:6px;
  border-radius:4px;
  background: linear-gradient(to right,
    #e74c3c 0%,
    #e74c3c 33%,
    #bdc3c7 50%,
    #2ecc71 100%);
}

.value {
  font-weight:bold;
}

select, button {
  padding:8px;
  margin-right:10px;
}

@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h1>五力互動評估系統</h1>

<div>
  情境：
  <select id="context" onchange="loadContext()">
    <option>工作</option>
    <option>關係</option>
    <option>家庭</option>
  </select>

  <button onclick="resetAll()">重置</button>
</div>

<div class="container" id="controls"></div>

<script>

const labels = ["守門","照顧","釐清","自發","調適"];

let state = {
  工作:[0,0,0,0,0],
  關係:[0,0,0,0,0],
  家庭:[0,0,0,0,0]
};

const desc = {
  "-3":"撐不起",
  "0":"穩定可承載",
  "3":"過度"
};

const questions = [
  ["我要不要設界線？","我界線OK嗎？","我太封閉嗎？"],
  ["我在給還是耗？","我有平衡嗎？","我過度付出？"],
  ["我看到事實嗎？","我理解清楚嗎？","我過度分析？"],
  ["我有表達自己嗎？","我自在嗎？","我失控了？"],
  ["我有彈性嗎？","我適應得宜？","我變太多？"]
];

function createUI(){
  const container = document.getElementById("controls");
  container.innerHTML = "";

  labels.forEach((label,i)=>{
    const val = getState()[i];

    container.innerHTML += `
      <div class="card">
        <h3>${label}：<span class="value">${val}</span></h3>
        <input class="slider" type="range" min="-3" max="3" value="${val}"
          oninput="update(${i}, this.value)">
        <div class="bar"></div>
        <p>${getText(val)}</p>
        <p><b>提問：</b>${getQuestion(i,val)}</p>
      </div>
    `;
  });
}

function getText(v){
  if(v<=-2) return desc["-3"];
  if(v>=2) return desc["3"];
  return desc["0"];
}

function getQuestion(i,v){
  if(v<=-2) return questions[i][0];
  if(v>=2) return questions[i][2];
  return questions[i][1];
}

function update(i,val){
  const ctx = document.getElementById("context").value;
  state[ctx][i] = Number(val);
  createUI();
}

function getState(){
  return state[document.getElementById("context").value];
}

function resetAll(){
  const ctx = document.getElementById("context").value;
  state[ctx] = [0,0,0,0,0];
  createUI();
}

function loadContext(){
  createUI();
}

createUI();

</script>

</body>
</html>
