<!-- ⭐ 只展示關鍵新增函式，其餘維持 v9 -->
<script>

/* ⭐ 新增：組合解讀 */
function getCombinationInsight(){

  const s = state;
  let results = [];

  if(s[0]>=2 && s[1]<=-2){
    results.push("守門高 × 照顧低：傾向防衛，關係距離拉開");
  }

  if(s[0]<=-2 && s[1]>=2){
    results.push("守門低 × 照顧高：容易過度付出");
  }

  if(s[2]<=-2 && s[3]>=2){
    results.push("釐清低 × 自發高：行動偏衝動");
  }

  if(s[2]>=2 && s[3]<=-2){
    results.push("釐清高 × 自發低：過度思考而停滯");
  }

  if(s[4]>=2 && s[0]<=-2){
    results.push("調適高 × 守門低：容易過度迎合");
  }

  return results;
}


/* ⭐ 修改 showInsight */
function showInsight(i){

  const v = state[i];

  const combo = getCombinationInsight();

  document.getElementById("insight").innerHTML = `
    <div class="title">${labels[i]}：${v}（${getText(v)}）</div>
    <div>${getQuestion(i,v)}</div>

    <br>

    <div>${getAdvice(v)}</div>

    ${
      combo.length > 0
      ? `<hr><div class="title">組合解讀</div>
         ${combo.map(c=>`<div>• ${c}</div>`).join("")}`
      : ""
    }
  `;
}

</script>
