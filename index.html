<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FivePower v4.1</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

<style>
body { font-family: sans-serif; padding:20px; }

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  margin-bottom:15px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.question { color:#555; }

/* ⭐ 柔和配色 */
.gate   { background:#fdecea; }
.care   { background:#eaf2fb; }
.clear  { background:#f3ecfb; }
.actionc{ background:#fef5e7; }
.adapt  { background:#eafaf1; }

button {
  padding:6px 10px;
  cursor:pointer;
  border:none;
  border-radius:6px;
}

.action {
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:8px;
}

.action button:nth-child(2) {
  font-weight:bold;
}

#chartBox { align-self:start; }

@media (max-width:768px){
  .container { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<h1>五力互動系統 v4.1</h1>

<label>情境：</label>
<select id="context" onchange="render()">
  <option value="work">工作</option>
  <option value="relationship">關係</option>
  <option value="family">家庭</option>
</select>

<button onclick="resetCurrent()">重置此情境</button>
<button onclick="resetAll()">全部重置</button>

<div class="container">

  <div id="app"></div>

  <div id="chartBox">
    <canvas id="radar"></canvas>
  </div>

</div>

<script>
try {

const labels = ["守門力","照顧力","釐清力","自發力","調適力"];

const colors = [
  "#d98880",
  "#7fb3d5",
  "#bb8fce",
  "#f5b041",
  "#82e0aa"
];

function empty(){ return [0,0,0,0,0]; }

let state = {
  work: empty(),
  relationship: empty(),
  family: empty()
};

const questions = [
  ["我是不是太沒有界線？","我現在的界線適當嗎？","我是不是太封閉？"],
  ["我是不是忽略自己或他人？","我有在平衡照顧嗎？","我是不是過度付出？"],
  ["我看到的是事實還是猜測？","我理解夠清楚嗎？","我是不是想太多？"],
  ["我有表達自己嗎？","我有自在展現嗎？","我是不是太衝動？"],
  ["我有保持彈性嗎？","我調整得合適嗎？","我是不是過度適應？"]
];

function getText(v){
  if(v<=-2) return "偏低";
  if(v>=2) return "偏高";
  return "適中";
}

function getQuestion(i,v){
  if(v<=-2) return questions[i][0];
  if(v>=2) return questions[i][2];
  return questions[i][1];
}

let chart=null;

function render(){
  const ctx = document.getElementById("context").value;
  const app = document.getElementById("app");

  let html="";
  const classMap = ["gate","care","clear","actionc","adapt"];

  labels.forEach((label,i)=>{
    let val = state[ctx][i];

    html += `
    <div class="card ${classMap[i]}">
      <h3>${label}：${val}</h3>

      <input type="range" min="-3" max="3" value="${val}"
        oninput="update(${i}, this.value)">

      <div class="action">
        <button onclick="adjust(${i}, -1)">⬅ 收斂</button>
        <button onclick="setMid(${i})">● 穩定</button>
        <button onclick="adjust(${i}, 1)">補強 ➡</button>
      </div>

      <p>狀態：${getText(val)}</p>
      <p class="question">提問：${getQuestion(i,val)}</p>
    </div>
    `;
  });

  app.innerHTML = html;
  updateChart();
}

function update(i,val){
  const ctx = document.getElementById("context").value;
  state[ctx][i] = Number(val);
  render();
}

function adjust(i,delta){
  const ctx = document.getElementById("context").value;
  let v = state[ctx][i] + delta;
  v = Math.max(-3, Math.min(3, v));
  state[ctx][i] = v;
  render();
}

function setMid(i){
  const ctx = document.getElementById("context").value;
  state[ctx][i] = 0;
  render();
}

function resetCurrent(){
  const ctx = document.getElementById("context").value;
  state[ctx] = empty();
  render();
}

function resetAll(){
  state.work = empty();
  state.relationship = empty();
  state.family = empty();
  render();
}

/* ⭐ 清晰版雷達圖 */
function updateChart(){
  if(typeof Chart==="undefined") return;

  const ctxName = document.getElementById("context").value;
  const data = state[ctxName];

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("radar"), {
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:data,
        fill:true,
        backgroundColor:"rgba(100,100,100,0.06)",
        borderColor:"rgba(80,80,80,0.4)",
        borderWidth:2,
        pointBackgroundColor:colors,
        pointBorderColor:"#fff",
        pointBorderWidth:2,
        pointRadius:5
      }]
    },
    options:{
      plugins:{
        legend:{ display:false }
      },
      scales:{
        r:{
          min:-3,
          max:3,
          ticks:{ stepSize:1, backdropColor:"transparent" },
          grid:{ color:"rgba(0,0,0,0.08)" },
          angleLines:{ color:"rgba(0,0,0,0.08)" },
          pointLabels:{ color:"#444", font:{ size:12 } }
        }
      }
    }
  });
}

render();

} catch(e){
  document.body.innerHTML = "<h2>錯誤</h2>"+e;
}
</script>

</body>
</html>
