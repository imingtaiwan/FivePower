<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FivePower（穩定版）</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

<style>
body { font-family: sans-serif; padding:16px; }

/* ⭐ 左右穩定分欄 */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-items: start;
}

/* ⭐ 關鍵：限制雷達圖大小 */
.chartBox {
  height: 400px;
  position: relative;
}

/* ⭐ canvas 填滿但不超出 */
canvas {
  width: 100% !important;
  height: 100% !important;
}

/* 卡片 */
.card {
  margin-bottom:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* 五力色塊 */
.gate   { background:#fdecea; }
.care   { background:#eaf2fb; }
.clear  { background:#f3ecfb; }
.actionc{ background:#fef5e7; }
.adapt  { background:#eafaf1; }

.header {
  display:flex;
  justify-content:space-between;
}

.value {
  font-size:18px;
  font-weight:bold;
}

.control-row {
  display:flex;
  gap:6px;
  margin-top:6px;
}

input[type="range"] { flex:1; }

button {
  padding:4px 8px;
  border:none;
  border-radius:6px;
}

.question { font-size:13px; color:#555; }

@media (max-width:768px){
  .container { grid-template-columns:1fr; }
  .chartBox { height:300px; }
}
</style>
</head>

<body>

<h2>五力互動系統</h2>

<button onclick="resetAll()">重置</button>

<div class="container">
  <div id="app"></div>

  <div class="chartBox">
    <canvas id="radar"></canvas>
  </div>
</div>

<script>

const labels = ["守門力","照顧力","釐清力","自發力","調適力"];
const colors = ["#d98880","#7fb3d5","#bb8fce","#f5b041","#82e0aa"];
const classMap = ["gate","care","clear","actionc","adapt"];

let state = [0,0,0,0,0];

function getText(v){
  if(v<=-2) return "偏低";
  if(v>=2) return "偏高";
  return "適中";
}

let chart;

/* ⭐ 向量線 */
const vectorPlugin = {
  id:'vectorLines',
  afterDatasetsDraw(chart){
    const {ctx, scales:{r}} = chart;
    const cx = r.xCenter;
    const cy = r.yCenter;

    chart.data.datasets[0].data.forEach((v,i)=>{
      const pt = r.getPointPositionForValue(i,v);

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(pt.x,pt.y);
      ctx.lineWidth = 4;
      ctx.strokeStyle = colors[i];
      ctx.stroke();
    });
  }
};

function render(){
  document.getElementById("app").innerHTML = labels.map((l,i)=>`
    <div class="card ${classMap[i]}">

      <div class="header">
        <div>${l}</div>
        <div class="value">${state[i]}</div>
      </div>

      <div class="control-row">
        <button onclick="adjust(${i},-1)">⬅</button>

        <input type="range" min="-3" max="3"
        value="${state[i]}"
        oninput="update(${i},this.value)">

        <button onclick="adjust(${i},1)">➡</button>
      </div>

      <div class="question">${getText(state[i])}</div>

    </div>
  `).join("");

  draw();
}

function update(i,v){
  state[i]=Number(v);
  render();
}

function adjust(i,d){
  state[i]=Math.max(-3,Math.min(3,state[i]+d));
  render();
}

function resetAll(){
  state=[0,0,0,0,0];
  render();
}

function draw(){

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("radar"),{
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:state,
        showLine:false,
        fill:false,
        pointBackgroundColor:colors,
        pointRadius:6
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,  // ⭐ 關鍵
      plugins:{ legend:{display:false} },
      scales:{ r:{ min:-3,max:3 } }
    },
    plugins:[vectorPlugin]
  });
}

render();

</script>

</body>
</html>
