<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FivePower v8.2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

<style>
body { font-family: sans-serif; padding:16px; }

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  margin-bottom:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

.question { color:#555; font-size:13px; }

.gate   { background:#fdecea; }
.care   { background:#eaf2fb; }
.clear  { background:#f3ecfb; }
.actionc{ background:#fef5e7; }
.adapt  { background:#eafaf1; }

button {
  padding:4px 8px;
  cursor:pointer;
  border:none;
  border-radius:6px;
  font-size:12px;
}

.control-row {
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:6px;
}

input[type="range"]{
  flex:1;
}

#chartBox { align-self:start; }

@media (max-width:768px){
  .container { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<h2>五力互動系統 v8.2（向量模式）</h2>

<button onclick="resetAll()">重置</button>

<div class="container">
  <div id="app"></div>
  <div id="chartBox">
    <canvas id="radar"></canvas>
  </div>
</div>

<script>
try {

const labels = ["守門力","照顧力","釐清力","自發力","調適力"];
const colors = ["#d98880","#7fb3d5","#bb8fce","#f5b041","#82e0aa"];

function empty(){ return [0,0,0,0,0]; }

let state = empty();

const questions = [
  ["我是不是太沒有界線？","我現在的界線適當嗎？","我是不是太封閉？"],
  ["我是不是忽略自己或他人？","我有在平衡照顧嗎？","我是不是過度付出？"],
  ["我看到的是事實還是猜測？","我理解夠清楚嗎？","我是不是想太多？"],
  ["我有表達自己嗎？","我有自在展現嗎？","我是不是太衝動？"],
  ["我有保持彈性嗎？","我調整得合適嗎？","我是不是過度適應？"]
];

function getText(v){
  if(v<=-2) return "偏低";
  if(v>=2) return "偏高";
  return "適中";
}

function getQuestion(i,v){
  if(v<=-2) return questions[i][0];
  if(v>=2) return questions[i][2];
  return questions[i][1];
}

let chart=null;

/* ⭐ 向量線 plugin */
const vectorPlugin = {
  id: 'vectorLines',
  afterDatasetsDraw(chart){
    const {ctx, scales:{r}} = chart;
    const cx = r.xCenter;
    const cy = r.yCenter;

    chart.data.datasets[0].data.forEach((value, i) => {
      const pt = r.getPointPositionForValue(i, value);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(pt.x, pt.y);
      ctx.lineWidth = 4;
      ctx.strokeStyle = colors[i];
      ctx.stroke();
      ctx.restore();
    });
  }
};

function render(){
  const app = document.getElementById("app");
  const classMap = ["gate","care","clear","actionc","adapt"];

  app.innerHTML = labels.map((label,i)=>{
    const val = state[i];

    return `
    <div class="card ${classMap[i]}">

      <div style="display:flex; justify-content:space-between;">
        <strong>${label}</strong>
        <span style="font-size:18px; font-weight:bold;">${val}</span>
      </div>

      <div class="control-row">
        <button onclick="adjust(${i}, -1)">⬅</button>

        <input type="range" min="-3" max="3" value="${val}"
          oninput="update(${i}, this.value)">

        <button onclick="setMid(${i})">●</button>
        <button onclick="adjust(${i}, 1)">➡</button>
      </div>

      <div class="question">
        ${getText(val)}｜${getQuestion(i,val)}
      </div>

    </div>`;
  }).join("");

  updateChart();
}

function update(i,val){
  state[i] = Number(val);
  render();
}

function adjust(i,delta){
  let v = state[i] + delta;
  v = Math.max(-3, Math.min(3, v));
  state[i] = v;
  render();
}

function setMid(i){
  state[i] = 0;
  render();
}

function resetAll(){
  state = empty();
  render();
}

function updateChart(){
  if(typeof Chart==="undefined") return;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("radar"), {
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:state,
        showLine:false,
        fill:false,
        borderWidth:0,
        pointBackgroundColor:colors,
        pointBorderColor:"#fff",
        pointBorderWidth:2,
        pointRadius:6
      }]
    },
    options:{
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            label:function(context){
              const i = context.dataIndex;
              const v = context.raw;
              return [
                labels[i] + "：" + v,
                "狀態：" + getText(v),
                "👉 " + getQuestion(i,v)
              ];
            }
          }
        }
      },
      scales:{
        r:{
          min:-3,
          max:3,
          ticks:{ stepSize:1, backdropColor:"transparent" },
          grid:{ color:"rgba(0,0,0,0.08)" },
          angleLines:{ color:"rgba(0,0,0,0.08)" }
        }
      }
    },
    plugins:[vectorPlugin]
  });
}

render();

} catch(e){
  document.body.innerHTML = "<h2>錯誤</h2>"+e;
}
</script>

</body>
</html>
