<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>五力互動系統 v12｜</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

<style>

body{
  font-family:sans-serif;
  padding:16px;
  background:#f5f5f5;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.rightPanel{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.chartBox{
  height:380px;
  background:white;
  border-radius:12px;
  border:1px solid #ddd;
  padding:12px;
}

.card{
  display:flex;
  align-items:center;
  gap:12px;

  background:white;
  border-radius:12px;
  border:1px solid #ddd;

  padding:10px;
  margin-bottom:12px;
}

.iconBox{
  width:72px;
  height:72px;

  display:flex;
  justify-content:center;
  align-items:center;

  flex-shrink:0;
}

.iconBox img{
  width:64px;
  height:64px;
  object-fit:contain;
}

.content{
  flex:1;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.value{
  font-size:20px;
  font-weight:bold;
}

.control-row{
  display:flex;
  gap:6px;
  margin-top:6px;
}

input{
  flex:1;
}

button{
  padding:4px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.panel{
  background:white;
  border:1px solid #ddd;
  border-radius:12px;
  padding:14px;
}

.title{
  font-weight:bold;
  margin-bottom:8px;
}

.sub{
  font-size:13px;
  color:#666;
  margin-top:4px;
}

@media(max-width:768px){

  .container{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<h2>五力互動系統 v12 </h2>

<button onclick="resetAll()">重置</button>

<div class="container">

  <!-- 左側 -->
  <div id="app"></div>

  <!-- 右側 -->
  <div class="rightPanel">

    <div class="chartBox">
      <canvas id="radar"></canvas>
    </div>

    <div class="panel" id="insight">

      <div class="title">解讀區</div>

      請操作滑桿或點擊雷達圖

    </div>

  </div>

</div>

<script>

/* ⭐ 人型順序 */

const labels = [
  "釐清力",
  "照顧力",
  "調適力",
  "自發力",
  "守門力"
];

const colors = [
  "#bb8fce",
  "#7fb3d5",
  "#82e0aa",
  "#f4d03f",
  "#d98880"
];

const icons = [
  "glasses.png",
  "water.png",
  "bag.png",
  "star.png",
  "key.png"
];

const subtitles = [
  "聚焦觀察・理解脈絡",
  "照顧自己・補充能量",
  "調整變化・維持彈性",
  "啟動能量・自然表達",
  "界線管理・保護自己"
];

let state = [0,0,0,0,0];

const questions = [

  ["是否過度簡化？","理解是否清楚？","是否過度分析？"],

  ["是否忽略他人？","照顧是否平衡？","是否過度付出？"],

  ["是否過度僵化？","是否保持彈性？","是否過度迎合？"],

  ["是否壓抑自己？","是否自然表達？","是否過度衝動？"],

  ["界線是否不足？","界線是否適中？","是否過度封閉？"]

];

function getText(v){

  if(v <= -2) return "偏低";

  if(v >= 2) return "偏高";

  return "適中";

}

function getQuestion(i,v){

  if(v <= -2) return questions[i][0];

  if(v >= 2) return questions[i][2];

  return questions[i][1];

}

function getAdvice(v){

  if(v <= -2){
    return "👉 建議：補強此力";
  }

  if(v >= 2){
    return "👉 建議：適度收斂";
  }

  return "👉 建議：維持目前狀態";

}

/* ⭐ 組合解讀 */

function getCombinationInsight(){

  let r = [];

  if(state[4] >= 2 && state[1] <= -2){
    r.push("守門高 × 照顧低：防衛強，關係距離拉開");
  }

  if(state[4] <= -2 && state[1] >= 2){
    r.push("守門低 × 照顧高：容易過度付出");
  }

  if(state[0] <= -2 && state[3] >= 2){
    r.push("釐清低 × 自發高：容易衝動行動");
  }

  if(state[0] >= 2 && state[3] <= -2){
    r.push("釐清高 × 自發低：容易過度思考");
  }

  if(state[2] >= 2 && state[4] <= -2){
    r.push("調適高 × 守門低：容易過度迎合");
  }

  return r;

}

function showInsight(i){

  const v = state[i];

  const combo = getCombinationInsight();

  document.getElementById("insight").innerHTML = `

    <div class="title">
      ${labels[i]}：${v}（${getText(v)}）
    </div>

    <div>
      👉 ${getQuestion(i,v)}
    </div>

    <br>

    <div>
      ${getAdvice(v)}
    </div>

    ${
      combo.length > 0
      ?
      `
      <hr>

      <div class="title">組合解讀</div>

      ${combo.map(c=>`<div>• ${c}</div>`).join("")}
      `
      :
      ""
    }

  `;

}

let chart;

/* ⭐ 向量線 */

const vectorPlugin = {

  id:'vectorLines',

  afterDatasetsDraw(chart){

    const {ctx, scales:{r}} = chart;

    const cx = r.xCenter;
    const cy = r.yCenter;

    chart.data.datasets[0].data.forEach((v,i)=>{

      const pt = r.getPointPositionForValue(i,v);

      ctx.beginPath();

      ctx.moveTo(cx,cy);

      ctx.lineTo(pt.x,pt.y);

      ctx.lineWidth = 4;

      ctx.strokeStyle = colors[i];

      ctx.stroke();

    });

  }

};

function render(){

  document.getElementById("app").innerHTML =

  labels.map((l,i)=>`

    <div class="card">

      <div class="iconBox">
        <img src="${icons[i]}">
      </div>

      <div class="content">

        <div class="header">

          <div>
            <div class="title">${l}</div>
            <div class="sub">${subtitles[i]}</div>
          </div>

          <div class="value">${state[i]}</div>

        </div>

        <div class="control-row">

          <button onclick="adjust(${i},-1)">⬅</button>

          <input
            type="range"
            min="-3"
            max="3"
            value="${state[i]}"
            oninput="update(${i},this.value);showInsight(${i})"
          >

          <button onclick="adjust(${i},1)">➡</button>

        </div>

      </div>

    </div>

  `).join("");

  draw();

}

function update(i,v){

  state[i] = Number(v);

  render();

}

function adjust(i,d){

  state[i] = Math.max(-3,Math.min(3,state[i] + d));

  render();

  showInsight(i);

}

function resetAll(){

  state = [0,0,0,0,0];

  render();

  document.getElementById("insight").innerHTML = `
    <div class="title">解讀區</div>
    請操作滑桿或點擊雷達圖
  `;

}

function draw(){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("radar"),{

    type:'radar',

    data:{

      labels:labels,

      datasets:[{

        data:state,

        showLine:false,

        fill:false,

        pointBackgroundColor:colors,

        pointRadius:7

      }]

    },

    options:{

      responsive:true,

      maintainAspectRatio:false,

      plugins:{

        legend:{
          display:false
        },

        tooltip:{

          callbacks:{

            label:(c)=>{

              const i = c.dataIndex;

              const v = c.raw;

              return [
                labels[i] + "：" + v,
                "狀態：" + getText(v),
                "👉 " + getQuestion(i,v)
              ];

            }

          }

        }

      },

      scales:{
        r:{
          min:-3,
          max:3
        }
      },

      onClick:(e,els)=>{

        if(els.length){

          const i = els[0].index;

          showInsight(i);

        }

      }

    },

    plugins:[vectorPlugin]

  });

}

render();

</script>

</body>
</html>
