<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FivePower v8.3-final</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

<style>
body { font-family: sans-serif; padding:16px; }

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ⭐ 五力色塊回來了 */
.gate   { background:#fdecea; }
.care   { background:#eaf2fb; }
.clear  { background:#f3ecfb; }
.actionc{ background:#fef5e7; }
.adapt  { background:#eafaf1; }

.card {
  margin-bottom:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.value {
  font-size:18px;
  font-weight:bold;
}

.question { color:#555; font-size:13px; }

.control-row {
  display:flex;
  gap:6px;
  margin-top:6px;
}

input[type="range"]{ flex:1; }

button {
  padding:4px 8px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>五力互動系統（最終穩定版）</h2>

<button onclick="resetAll()">重置</button>

<div class="container">
  <div id="app"></div>
  <canvas id="radar"></canvas>
</div>

<script>

const labels = ["守門力","照顧力","釐清力","自發力","調適力"];
const colors = ["#d98880","#7fb3d5","#bb8fce","#f5b041","#82e0aa"];

const classMap = ["gate","care","clear","actionc","adapt"];

let state = [0,0,0,0,0];

const questions = [
  ["我是不是太沒有界線？","我現在的界線適當嗎？","我是不是太封閉？"],
  ["我是不是忽略自己或他人？","我有在平衡照顧嗎？","我是不是過度付出？"],
  ["我看到的是事實還是猜測？","我理解夠清楚嗎？","我是不是想太多？"],
  ["我有表達自己嗎？","我有自在展現嗎？","我是不是太衝動？"],
  ["我有保持彈性嗎？","我調整得合適嗎？","我是不是過度適應？"]
];

function getText(v){
  if(v<=-2) return "偏低";
  if(v>=2) return "偏高";
  return "適中";
}

function getQuestion(i,v){
  if(v<=-2) return questions[i][0];
  if(v>=2) return questions[i][2];
  return questions[i][1];
}

let chart;

/* ⭐ 向量線 */
const vectorPlugin = {
  id:'vectorLines',
  afterDatasetsDraw(chart){
    const {ctx, scales:{r}} = chart;
    const cx = r.xCenter;
    const cy = r.yCenter;

    chart.data.datasets[0].data.forEach((v,i)=>{
      const pt = r.getPointPositionForValue(i,v);

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(pt.x,pt.y);
      ctx.lineWidth = 4;
      ctx.strokeStyle = colors[i];
      ctx.stroke();
    });
  }
};

function render(){

  document.getElementById("app").innerHTML = labels.map((label,i)=>`
    <div class="card ${classMap[i]}">

      <div class="header">
        <div>${label}</div>
        <div class="value">${state[i]}</div>
      </div>

      <div class="control-row">
        <button onclick="adjust(${i},-1)">⬅</button>

        <input type="range" min="-3" max="3"
        value="${state[i]}"
        oninput="update(${i},this.value)">

        <button onclick="setMid(${i})">●</button>
        <button onclick="adjust(${i},1)">➡</button>
      </div>

      <div class="question">
        ${getText(state[i])}｜${getQuestion(i,state[i])}
      </div>

    </div>
  `).join("");

  draw();
}

function update(i,v){
  state[i]=Number(v);
  render();
}

function adjust(i,d){
  state[i]=Math.max(-3,Math.min(3,state[i]+d));
  render();
}

function setMid(i){
  state[i]=0;
  render();
}

function resetAll(){
  state=[0,0,0,0,0];
  render();
}

function draw(){

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("radar"),{
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:state,
        showLine:false,
        fill:false,
        backgroundColor:'transparent',
        pointBackgroundColor:colors,
        pointRadius:6
      }]
    },
    options:{
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            label:(c)=>{
              const i=c.dataIndex;
              const v=c.raw;
              return [
                labels[i]+"："+v,
                "狀態："+getText(v),
                "👉 "+getQuestion(i,v)
              ];
            }
          }
        }
      },
      scales:{
        r:{ min:-3,max:3 }
      }
    },
    plugins:[vectorPlugin]
  });
}

render();

</script>

</body>
</html>
