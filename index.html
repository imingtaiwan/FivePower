<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FivePower v8.4</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

<style>
body { font-family: sans-serif; padding:16px; }

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  margin-bottom:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

.header {
  display:flex;
  justify-content:space-between;
}

.value {
  font-size:18px;
  font-weight:bold;
}

.question { color:#555; font-size:13px; }

.gate   { background:#fdecea; }
.care   { background:#eaf2fb; }
.clear  { background:#f3ecfb; }
.actionc{ background:#fef5e7; }
.adapt  { background:#eafaf1; }

.control-row {
  display:flex;
  gap:6px;
  margin-top:6px;
}

input { flex:1; }

button {
  padding:4px 8px;
  border:none;
  border-radius:6px;
}

</style>
</head>

<body>

<h2>五力互動系統 v8.4</h2>

<button onclick="resetAll()">重置</button>

<div class="container">
  <div id="app"></div>
  <canvas id="radar"></canvas>
</div>

<script>

const labels = ["守門力","照顧力","釐清力","自發力","調適力"];
const colors = ["#d98880","#7fb3d5","#bb8fce","#f5b041","#82e0aa"];

let state = [0,0,0,0,0];

function render(){

  document.getElementById("app").innerHTML = labels.map((label,i)=>{

    return `
    <div class="card">

      <div class="header">
        <div>${label}</div>
        <div class="value">${state[i]}</div>
      </div>

      <div class="control-row">
        <button onclick="adjust(${i},-1)">⬅</button>

        <input type="range" min="-3" max="3" value="${state[i]}"
        oninput="update(${i},this.value)">

        <button onclick="adjust(${i},1)">➡</button>
      </div>

    </div>
    `;

  }).join("");

  draw();
}

function update(i,v){
  state[i]=Number(v);
  render();
}

function adjust(i,d){
  state[i]=Math.max(-3,Math.min(3,state[i]+d));
  render();
}

function resetAll(){
  state=[0,0,0,0,0];
  render();
}

let chart;

function draw(){
  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("radar"),{
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:state,
        pointBackgroundColor:colors,
        showLine:false
      }]
    }
  });
}

render();

</script>

</body>
</html>
